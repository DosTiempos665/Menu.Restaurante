<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página Web</title>

    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
        }

        nav{
            background-color:#0077b6;
            padding:15px;
        }

        nav ul{
            list-style:none;
            margin:0;
            padding:0;
            display:flex;
            justify-content:center;
        }

        nav ul li{
            margin:0 20px;
        }

        nav ul li a{
            color:white;
            text-decoration:none;
            font-size:18px;
            font-weight:bold;
        }

        nav ul li a:hover{
            color:#ffd60a;
        }
    </style>
</head>
<body>

    <nav>
        <ul>
            <li><a href="#inicio">Inicio</a></li>
            <li><a href="#nosotros">Nosotros</a></li>
            <li><a href="#servicios">Servicios</a></li>
            <li><a href="#contacto">Contacto</a></li>
        </ul>
    </nav>

    <section id="inicio">
        <h1>Bienvenido</h1>
        <p>Contenido de inicio.</p>
    </section>

    <section id="nosotros">
        <h1>Nosotros</h1>
        <p>Información de la empresa.</p>
    </section>

    <section id="servicios">
        <h1>Servicios</h1>
        <p>Descripción de servicios.</p>
    </section>

    <section id="contacto">
        <h1>Contacto</h1>
        <p>Datos de contacto.</p>
    </section>

</body>
</html>
