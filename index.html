<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Premium - Dos Tiempos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- VARIABLES DE DISEÑO (Para fácil personalización) --- */
        :root {
            --bg-global: #f4f1ea;       /* Crema de fondo suave */
            --bg-card: #fbfaf7;         /* Blanco roto premium para las hojas */
            --green-primary: #4a5849;   /* Verde oliva oscuro elegante */
            --green-accent: #718370;    /* Verde oliva medio para detalles */
            --text-dark: #2c352b;       /* Color de texto principal casi negro */
            --text-muted: #616e60;      /* Color de descripciones */
            --gold-subtle: #c2b29a;     /* Toque dorado apagado para detalles de lujo */
            --shadow-premium: 0 20px 40px rgba(44, 53, 43, 0.06);
        }

        /* --- ESTILOS BASE Y ANIMACIONES --- */
        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            background-color: var(--bg-global);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-dark);
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px;
            -webkit-font-smoothing: antialiased;
        }

        /* --- CONTENEDOR ESTILO "HOJA DE MENÚ" --- */
        .menu-page {
            background-color: var(--bg-card);
            max-width: 900px;
            width: 100%;
            padding: 60px;
            border-radius: 4px;
            box-shadow: var(--shadow-premium);
            border: 1px solid rgba(194, 178, 154, 0.2); /* Borde dorado sutil */
            position: relative;
        }

        /* Efecto elegante al pasar el cursor sobre la hoja */
        .menu-page:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(44, 53, 43, 0.1);
        }

        /* Marco interior fino clásico de restaurante */
        .menu-page::after {
            content: '';
            position: absolute;
            top: 20px;
            bottom: 20px;
            left: 20px;
            right: 20px;
            border: 1px solid rgba(74, 88, 73, 0.15);
            pointer-events: none;
            border-radius: 2px;
        }

        /* --- ENCABEZADOS DE LUJO --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--green-primary);
            padding-bottom: 20px;
            margin-bottom: 45
